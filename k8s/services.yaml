---
apiVersion: v1
kind: Service
metadata:
  name: ingest-svc
  namespace: surveillance
spec:
  selector:
    app: ingest
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
---
apiVersion: v1
kind: Service
metadata:
  name: ai-detect-svc
  namespace: surveillance
spec:
  selector:
    app: ai-detect
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
---
apiVersion: v1
kind: Service
metadata:
  name: ptz-control-svc
  namespace: surveillance
spec:
  selector:
    app: ptz-control
  ports:
    - name: grpc-ptz
      port: 50053
      targetPort: 50053
    - name: grpc-log
      port: 50056
      targetPort: 50056
---
apiVersion: v1
kind: Service
metadata:
  name: storage-svc
  namespace: surveillance
spec:
  selector:
    app: storage
  ports:
    - name: grpc
      port: 50054
      targetPort: 50054
---
apiVersion: v1
kind: Service
metadata:
  name: stream-gateway-svc
  namespace: surveillance
spec:
  type: NodePort
  selector:
    app: stream-gateway
  ports:
    - name: grpc
      port: 50055
      targetPort: 50055
      nodePort: 30055
    - name: webrtc-signal
      port: 8080
      targetPort: 8080
      nodePort: 30080
