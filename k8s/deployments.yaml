---
# Camera Ingest Service - runs on Pi1 (cluster1)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: surveillance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      nodeSelector:
        kubernetes.io/hostname: cluster1
      containers:
        - name: ingest
          image: surveillance-ingest:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 5004
              protocol: UDP
              name: rtp-video
          envFrom:
            - configMapRef:
                name: surveillance-config
            - secretRef:
                name: surveillance-secrets
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      hostNetwork: true  # Required for multicast RTP
---
# AI Detection Service - runs on Nano
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-detect
  namespace: surveillance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-detect
  template:
    metadata:
      labels:
        app: ai-detect
    spec:
      nodeSelector:
        kubernetes.io/hostname: nano-desktop
      containers:
        - name: ai-detect
          image: surveillance-ai:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50052
              name: grpc
          envFrom:
            - configMapRef:
                name: surveillance-config
          resources:
            requests:
              cpu: 2000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 4Gi
          # Mount NVIDIA GPU
          volumeMounts:
            - name: wdpurple
              mountPath: /mnt/wdpurple
      volumes:
        - name: wdpurple
          persistentVolumeClaim:
            claimName: wdpurple-pvc
      hostNetwork: true
      runtimeClassName: nvidia  # For GPU access on Jetson
---
# PTZ Control + Log Service - runs on Pi3 (cluster3)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptz-control
  namespace: surveillance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ptz-control
  template:
    metadata:
      labels:
        app: ptz-control
    spec:
      nodeSelector:
        kubernetes.io/hostname: cluster3
      containers:
        - name: ptz-control
          image: surveillance-ptz:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50053
              name: grpc
          envFrom:
            - configMapRef:
                name: surveillance-config
            - secretRef:
                name: surveillance-secrets
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
        - name: log-service
          image: surveillance-log:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50056
              name: grpc
          envFrom:
            - configMapRef:
                name: surveillance-config
          volumeMounts:
            - name: wdpurple
              mountPath: /mnt/wdpurple
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: wdpurple
          persistentVolumeClaim:
            claimName: wdpurple-pvc
---
# Storage Service - runs on Pi2 (cluster2)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: storage
  namespace: surveillance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: storage
  template:
    metadata:
      labels:
        app: storage
    spec:
      nodeSelector:
        kubernetes.io/hostname: cluster2
      containers:
        - name: storage
          image: surveillance-storage:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50054
              name: grpc
          envFrom:
            - configMapRef:
                name: surveillance-config
          volumeMounts:
            - name: wdpurple
              mountPath: /mnt/wdpurple
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
      volumes:
        - name: wdpurple
          persistentVolumeClaim:
            claimName: wdpurple-pvc
      hostNetwork: true
---
# Streaming Gateway - runs on Pi4 (cluster4)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-gateway
  namespace: surveillance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-gateway
  template:
    metadata:
      labels:
        app: stream-gateway
    spec:
      nodeSelector:
        kubernetes.io/hostname: cluster4
      containers:
        - name: stream-gateway
          image: surveillance-stream:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 50055
              name: grpc
            - containerPort: 8080
              name: webrtc-signal
          envFrom:
            - configMapRef:
                name: surveillance-config
          volumeMounts:
            - name: wdpurple
              mountPath: /mnt/wdpurple
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: wdpurple
          persistentVolumeClaim:
            claimName: wdpurple-pvc
      hostNetwork: true
